<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Finance Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="screen active" data-screen="usuario">
        <header class="app-bar">
          <button class="icon-button" type="button" data-action="go" data-target="categorias" aria-label="Voltar">‹</button>
          <h1>Criar usuário</h1>
          <button class="icon-button" type="button" aria-label="Menu">⋮</button>
        </header>

        <form class="screen-content" id="usuarioForm">
          <div class="mb-3">
            <label class="form-label" for="nome">Nome</label>
            <input class="form-control" id="nome" name="nome" type="text" placeholder="João Silva" required>
          </div>

          <div class="mb-4">
            <label class="form-label" for="email">E-mail</label>
            <input class="form-control" id="email" name="email" type="email" placeholder="joao@email.com" required>
          </div>

          <div class="action-row">
            <button class="btn btn-success" type="submit">Salvar</button>
            <button class="btn btn-secondary" type="reset">Cancelar</button>
          </div>
        </form>
      </section>

      <section class="screen" data-screen="transacao">
        <header class="app-bar">
          <button class="icon-button" type="button" data-action="go" data-target="usuario" aria-label="Voltar">‹</button>
          <h1>Nova transação</h1>
          <button class="icon-button" type="button" aria-label="Menu">⋮</button>
        </header>

        <form class="screen-content" id="transacaoForm">
          <div class="mb-3">
            <label class="form-label" for="valor">Valor</label>
            <div class="input-group">
              <span class="input-group-text">R$</span>
              <input class="form-control" id="valor" name="valor" type="number" min="0.01" step="0.01" placeholder="150,00" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="data">Data</label>
            <input class="form-control" id="data" name="data" type="date" required>
          </div>

          <div class="mb-3">
            <label class="form-label" for="categoria">Categoria</label>
            <select class="form-select" id="categoria" name="categoria_id" required></select>
          </div>

          <div class="mb-3">
            <label class="form-label" for="tipo">Tipo</label>
            <select class="form-select" id="tipo" name="tipo" required>
              <option value="pix">Pix</option>
              <option value="debito">Débito</option>
              <option value="cartao">Cartão</option>
              <option value="dinheiro">Dinheiro</option>
              <option value="transferencia">Transferência</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label" for="parcelas">Parcelas</label>
            <input class="form-control" id="parcelas" name="parcelas" type="number" min="1" step="1" value="1">
          </div>

          <div class="mb-4">
            <label class="form-label" for="descricao">Descrição</label>
            <textarea class="form-control" id="descricao" name="descricao" rows="3" placeholder="Jantar no restaurante"></textarea>
          </div>

          <div class="action-row">
            <button class="btn btn-success" type="submit">Salvar</button>
            <button class="btn btn-secondary" type="reset">Cancelar</button>
          </div>
        </form>
      </section>

      <section class="screen" data-screen="categorias">
        <header class="app-bar">
          <button class="icon-button" type="button" data-action="go" data-target="transacao" aria-label="Voltar">‹</button>
          <h1>Gerenciar categorias</h1>
          <button class="icon-button" type="button" aria-label="Menu">⋮</button>
        </header>

        <div class="screen-content">
          <div class="month-selector">
            <label class="form-label" for="mesCategorias">Mês do orçamento</label>
            <input class="form-control" id="mesCategorias" type="month">
          </div>

          <section class="info-card category-overview">
            <h2>Resumo do mês</h2>
            <div class="category-overview-grid">
              <div>
                <span>Orçado</span>
                <strong id="categoriasTotalOrcado">R$ 0</strong>
              </div>
              <div>
                <span>Gasto</span>
                <strong id="categoriasTotalGasto">R$ 0</strong>
              </div>
              <div>
                <span>Disponível</span>
                <strong id="categoriasTotalDisponivel">R$ 0</strong>
              </div>
            </div>
          </section>

          <div id="categoriasList" class="category-list"></div>

          <form id="categoriaForm" class="add-category">
            <label class="form-label" for="novaCategoria">Nova categoria</label>
            <div class="input-group">
              <input class="form-control" id="novaCategoria" name="nome" type="text" placeholder="Saúde" required>
              <button class="btn btn-primary" type="submit">+ Adicionar</button>
            </div>
          </form>
        </div>
      </section>

      <section class="screen" data-screen="relatorio">
        <header class="app-bar">
          <button class="icon-button" type="button" data-action="go" data-target="categorias" aria-label="Voltar">‹</button>
          <h1>Relatório</h1>
          <button class="icon-button" type="button" aria-label="Menu">⋮</button>
        </header>

        <div class="screen-content">
          <div class="month-selector">
            <label class="form-label" for="mesRelatorio">Mês</label>
            <input class="form-control" id="mesRelatorio" type="month">
          </div>

          <div class="chart-card">
            <div class="bar-chart" id="monthlyBarChart">
              <div class="bar-wrap">
                <span class="bar-value" id="receitaBarValue">R$ 0</span>
                <div class="bar bar-green" id="receitaBar"></div>
              </div>
              <div class="bar-wrap">
                <span class="bar-value" id="despesaBarValue">R$ 0</span>
                <div class="bar bar-red" id="despesaBar"></div>
              </div>
              <div class="bar-wrap">
                <span class="bar-value" id="saldoBarValue">R$ 0</span>
                <div class="bar bar-blue" id="saldoBar"></div>
              </div>
            </div>
          </div>

          <div class="summary-list">
            <div><span>Total de receitas:</span><strong id="totalReceitas">R$ 0</strong></div>
            <div><span>Total de despesas:</span><strong class="text-danger" id="totalDespesas">R$ 0</strong></div>
            <div><span>Saldo atual:</span><strong class="text-info" id="saldoAtual">R$ 0</strong></div>
          </div>
        </div>
      </section>

      <section class="screen" data-screen="projecao">
        <header class="app-bar">
          <button class="icon-button" type="button" data-action="go" data-target="relatorio" aria-label="Voltar">‹</button>
          <h1>Projeção financeira</h1>
          <button class="icon-button" type="button" aria-label="Menu">⋮</button>
        </header>

        <div class="screen-content">
          <div class="chart-card">
            <h2>Renda comprometida nos próximos meses</h2>
            <div id="commitmentList" class="commitment-list"></div>
          </div>
        </div>
      </section>

      <nav class="bottom-nav" aria-label="Navegação principal">
        <button class="nav-item active" type="button" data-action="go" data-target="usuario">Usuário</button>
        <button class="nav-item" type="button" data-action="go" data-target="transacao">Transação</button>
        <button class="nav-item" type="button" data-action="go" data-target="categorias">Categorias</button>
        <button class="nav-item" type="button" data-action="go" data-target="relatorio">Relatório</button>
        <button class="nav-item" type="button" data-action="go" data-target="projecao">Projeção</button>
      </nav>

      <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3">
        <div id="appToast" class="toast text-bg-dark border-0" role="status" aria-live="polite" aria-atomic="true">
          <div class="toast-body"></div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="editCategoriaModal" tabindex="-1" aria-labelledby="editCategoriaTitle" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <form class="modal-content" id="editCategoriaForm">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="editCategoriaTitle">Editar categoria</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="editCategoriaID">
            <label class="form-label" for="editCategoriaNome">Nome</label>
            <input class="form-control" id="editCategoriaNome" type="text" required>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js?v=3"></script>
  </body>
</html>
