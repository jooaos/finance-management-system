services:
  api:
    build:
      dockerfile: build/docker/api/stable/Dockerfile
      context: .
    container_name: finance-management_stable
    entrypoint: [ "./api", "-env=.env"]
    ports:
      - "8080:8080"
    restart: on-failure:10
    networks:
      - finance_management
    depends_on:
      - db

  db:
    build: build/docker/mariadb
    container_name: finance_management_db
    ports:
      - '3306:3306'
    volumes:
      - ./build/docker/mariadb/_dbdata:/var/lib/mysql
      - ./build/docker/mariadb/scripts:/docker-entrypoint-initdb.d
    environment:
      - MARIADB_USER=admin
      - MARIADB_PASSWORD=admin
      - MYSQL_ROOT_PASSWORD=root
    networks:
      - finance_management

  migrate:
    image: migrate/migrate:v4.15.0
    profiles:
      - tools
    container_name: finance_management_migrate
    volumes:
      - ./db/migrations:/migrations/
    entrypoint:
      [
        "migrate",
        "-path",
        "migrations",
        "-database"
      ]
    networks:
      - finance_management

networks:
  finance_management:
    driver: bridge
